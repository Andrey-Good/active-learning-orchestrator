name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Run tests
        run: uv run pytest -q
      - name: Run Ruff
        run: uv run --with ruff ruff check .
      - name: Run Mypy
        run: uv run --with mypy mypy src/active_learning_sdk --ignore-missing-imports --no-error-summary
      - name: Build package
        run: uv build
      - name: Check package metadata
        run: uv run --with twine python -m twine check dist/*.tar.gz dist/*.whl
